# 매일 1회 RSS 수집 → data/ 커밋. ADR-0006 + ADR-0004.
# Cloudflare Pages가 main push를 감지하면 자동 재빌드(ADR-0003).

name: Daily Scrape

on:
  schedule:
    # ADR-0031: GitHub Actions schedule은 큐 부하 시 묵음 누락이 잦음
    # (2026-05-23/24/25/26 중 2회 누락 + 2회 cancel). 2-time trigger로 흡수.
    - cron: '0 21 * * *'  # UTC 21:00 = KST 06:00 (주 시각)
    - cron: '0 0 * * *'   # UTC 00:00 = KST 09:00 (누락 흡수)
    # 같은 날 두 번 도는 건 정상 — 두 번째 run 은 data/ 변경 없으면 commit skip (Commit data changes step 가드).
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  scrape:
    name: Scrape and commit
    runs-on: ubuntu-latest
    # 외부 API 12종 병렬 + RSS 24 source + Naver 순차 호출 누적 — 워스트 케이스 흡수.
    # 2026-05-23 run이 10m20s에 cancelled 됐기에 여유 확보.
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # write 권한으로 push까지 가야 하므로 default token 사용.
          persist-credentials: true

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Check today's data
        id: check
        # ADR-0031: 2-time trigger 중 두 번째 run이면 이미 today.json 있을 가능성 — scrape skip.
        # workflow_dispatch (수동) 은 force=true 로 override 가능.
        run: |
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          if [[ -f "data/${DATE}.json" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "today's data already exists (data/${DATE}.json) — skipping scrape"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Run scraper
        if: steps.check.outputs.skip != 'true'
        run: pnpm scrape
        env:
          TZ: Asia/Seoul
          # ADR-0020: Naver DataLab — Secrets에 등록 안 됐으면 자동 graceful skip.
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # ADR-0026: YouTube Data API v3 — Secrets 미등록 시 graceful skip.
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit data changes
        if: steps.check.outputs.skip != 'true'
        run: |
          if [[ -z "$(git status --porcelain data/)" ]]; then
            echo "No changes in data/ — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DATE=$(TZ=Asia/Seoul date +%Y-%m-%d)
          git add data/
          git commit -m "chore(data): ${DATE} scrape"
          git push origin HEAD:${GITHUB_REF_NAME}
